<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>香港交通搜索（纯前端 / 官方 API）</title>
  <style>
    :root{
      --bg:#0b0d10;
      --panel:#11151b;
      --muted:#7f8a9a;
      --text:#e8eef7;
      --soft:#1b2230;
      --line:#223043;
      --accent:#68a7ff;
      --good:#2ecc71;
      --warn:#f39c12;
      --bad:#e74c3c;
      --chip:#182032;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --radius: 14px;
    }
    [data-theme="light"]{
      --bg:#f6f8fb;
      --panel:#ffffff;
      --muted:#5a6472;
      --text:#111827;
      --soft:#f0f4fa;
      --line:#e5eaf2;
      --accent:#2563eb;
      --chip:#eef4ff;
      --shadow: 0 10px 24px rgba(17,24,39,.10);
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    .wrap{
      max-width: 1050px;
      margin: 0 auto;
      padding: 18px 14px 36px;
    }
    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .title h1{
      font-size: 18px;
      line-height: 1.2;
      margin:0;
      letter-spacing:.2px;
      font-weight: 750;
    }
    .title .sub{
      font-size: 12.5px;
      color:var(--muted);
      line-height:1.35;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:8px;
      justify-content:flex-end;
    }
    .btn, select, input{
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 13px;
      outline:none;
    }
    .btn{
      cursor:pointer;
      user-select:none;
      transition: transform .02s ease, background .15s ease, border-color .15s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn:active{transform: scale(.99);}
    .btn.primary{
      background: linear-gradient(180deg, rgba(104,167,255,.16), rgba(104,167,255,.08));
      border-color: rgba(104,167,255,.35);
    }
    .btn.ghost{
      background: transparent;
    }
    .btn .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--muted);
    }
    .btn .dot.ok{background:var(--good);}
    .btn .dot.bad{background:var(--bad);}
    .searchbar{
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin: 12px 0 10px;
    }
    .searchbar input{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin: 10px 0 10px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12.5px;
      cursor:pointer;
      user-select:none;
      transition: background .15s ease, border-color .15s ease, opacity .15s ease;
    }
    .chip[aria-pressed="true"]{
      border-color: rgba(104,167,255,.55);
      background: rgba(104,167,255,.12);
    }
    .chip small{color:var(--muted);}
    .grid{
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap: 12px;
      align-items:start;
    }
    @media (max-width: 920px){
      .grid{grid-template-columns:1fr; }
    }
    .panel{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel .hd{
      padding: 12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .panel .hd .left{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }
    .panel .hd .ttl{
      font-weight: 750;
      font-size: 13px;
      margin:0;
    }
    .panel .hd .meta{
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .panel .bd{padding: 10px 10px;}
    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .row{
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
      border-radius: 12px;
      padding: 10px 10px;
      cursor:pointer;
      user-select:none;
      transition: background .15s ease, border-color .15s ease, transform .02s ease;
    }
    [data-theme="light"] .row{
      background: linear-gradient(180deg, rgba(37,99,235,.03), rgba(255,255,255,0));
    }
    .row:hover{
      border-color: rgba(104,167,255,.45);
    }
    .row:active{transform: scale(.995);}
    .row .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .badge{
      font-family: var(--mono);
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.12);
      white-space:nowrap;
    }
    [data-theme="light"] .badge{ background: rgba(0,0,0,.04); }
    .row .name{
      font-weight: 750;
      font-size: 13px;
      line-height:1.25;
      margin:0;
    }
    .row .desc{
      font-size: 12.5px;
      color: var(--muted);
      margin-top:4px;
      line-height:1.35;
    }
    .kv{
      display:grid;
      grid-template-columns: 110px 1fr;
      gap:6px 10px;
      font-size: 12.5px;
      margin-top: 10px;
    }
    .kv div:nth-child(odd){ color: var(--muted); }
    .divider{height:1px;background:var(--line);margin:10px 0;}
    .eta{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:8px;
    }
    .eta .item{
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .eta .item .l{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }
    .eta .item .t{
      font-size: 12.5px;
      font-weight: 700;
      line-height:1.25;
    }
    .eta .item .s{
      font-size: 12px;
      color: var(--muted);
      line-height:1.25;
    }
    .eta .item .r{
      text-align:right;
      white-space:nowrap;
      font-family: var(--mono);
      font-size: 12.5px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .muted{color:var(--muted);}
    .tiny{font-size:12px;}
    .toast{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      z-index: 50;
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 999px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      max-width: min(760px, calc(100vw - 24px));
      display:none;
      gap:10px;
      align-items:center;
      color: var(--text);
      font-size: 12.5px;
    }
    .toast.show{display:flex;}
    .spinner{
      width:14px;height:14px;border-radius:50%;
      border:2px solid var(--line);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }
    @keyframes spin{to{transform: rotate(360deg);}}
    a{color:var(--accent);text-decoration:none;}
    a:hover{text-decoration:underline;}
    .mono{font-family:var(--mono);}
    .nowrap{white-space:nowrap;}
  </style>
</head>
<body>
<div class="wrap" id="app" data-theme="dark">
  <header>
    <div class="title">
      <h1 id="uiTitle">香港交通搜索</h1>
      <div class="sub" id="uiSub">纯前端 · 官方开放数据 API · 路线/站点/ETA</div>
    </div>
    <div class="controls">
      <select id="langSel" class="btn" title="Language">
        <option value="zh-Hans">简体</option>
        <option value="zh-Hant">繁體</option>
        <option value="en">English</option>
      </select>
      <button id="themeBtn" class="btn" type="button" title="Theme">
        <span class="dot ok" id="themeDot"></span>
        <span id="themeText">深色</span>
      </button>
      <button id="refreshBtn" class="btn primary" type="button">
        <span class="spinner" id="refreshSpin" style="display:none"></span>
        <span id="refreshText">刷新 ETA</span>
      </button>
    </div>
  </header>

  <div class="searchbar">
    <input id="q" type="search" autocomplete="off" spellcheck="false"
           placeholder="搜索：路线号码 / 路线名称 / 站点（例如 1A、机场、Central、旺角）" />
    <button id="clearBtn" class="btn ghost" type="button">清空</button>
  </div>

  <div class="filters" id="filters"></div>

  <div class="grid">
    <section class="panel">
      <div class="hd">
        <div class="left">
          <div class="ttl" id="resTitle">结果</div>
          <div class="meta" id="resMeta">—</div>
        </div>
        <div class="pill">
          <span id="statusDot" class="dot ok"></span>
          <span id="statusText">API 在线</span>
        </div>
      </div>
      <div class="bd">
        <div class="list" id="results"></div>
        <div class="muted tiny" id="hint" style="margin-top:10px; line-height:1.4;">
          提示：本工具仅调用官方开放数据 API，不跳转外部网站。若个别营运商接口限速，请稍后重试。
        </div>
      </div>
    </section>

    <aside class="panel">
      <div class="hd">
        <div class="left">
          <div class="ttl" id="detailTitle">详情</div>
          <div class="meta" id="detailMeta">—</div>
        </div>
        <div class="pill">
          <span class="mono" id="etaAuto">ETA: 30s</span>
        </div>
      </div>
      <div class="bd" id="detail">
        <div class="muted" id="detailEmpty" style="line-height:1.45;">
          选择一条路线或一个站点后，这里会显示详情与实时到站时间（ETA）。
        </div>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast">
  <div class="spinner" id="toastSpin" style="display:none"></div>
  <div id="toastMsg"></div>
</div>

<script>
(() => {
  // ---------------------------
  // i18n
  // ---------------------------
  const I18N = {
    "zh-Hans": {
      title: "香港交通搜索",
      sub: "纯前端 · 官方开放数据 API · 路线/站点/ETA",
      placeholder: "搜索：路线号码 / 路线名称 / 站点（例如 1A、机场、Central、旺角）",
      clear: "清空",
      refresh: "刷新 ETA",
      dark: "深色",
      light: "浅色",
      results: "结果",
      detail: "详情",
      apiOnline: "API 在线",
      apiIssue: "API 可能不可用/被限速",
      hint: "提示：本工具仅调用官方开放数据 API，不跳转外部网站。若个别营运商接口限速，请稍后重试。",
      filtersAll: "全部",
      filtersBus: "巴士",
      filtersGMB: "绿小",
      filtersMTR: "港铁/轻铁",
      filtersTram: "电车",
      filtersFerry: "渡轮",
      typeRoute: "路线",
      typeStop: "站点",
      typePlace: "地点",
      loading: "加载中…",
      noResult: "没有结果。可尝试输入更短关键字或切换筛选。",
      selectToSee: "选择一条路线或一个站点后，这里会显示详情与实时到站时间（ETA）。",
      updatedAt: "更新",
      direction: "方向",
      origin: "起点",
      destination: "终点",
      operator: "营运商",
      serviceType: "服务类型",
      bound: "方向代码",
      stopName: "站名",
      stopId: "站点 ID",
      routeId: "路线 ID",
      eta: "到站",
      mins: "分钟",
      arriving: "即将到达",
      noEta: "暂无 ETA",
      lastUpdate: "接口时间",
      platform: "站台/位置",
      remark: "备注",
    },
    "zh-Hant": {
      title: "香港交通搜尋",
      sub: "純前端 · 官方開放數據 API · 路線/站點/ETA",
      placeholder: "搜尋：路線號碼 / 路線名稱 / 站點（例如 1A、機場、Central、旺角）",
      clear: "清空",
      refresh: "刷新 ETA",
      dark: "深色",
      light: "淺色",
      results: "結果",
      detail: "詳情",
      apiOnline: "API 在線",
      apiIssue: "API 可能不可用/被限速",
      hint: "提示：本工具僅調用官方開放數據 API，不跳轉外部網站。若個別營運商介面限速，請稍後重試。",
      filtersAll: "全部",
      filtersBus: "巴士",
      filtersGMB: "綠小",
      filtersMTR: "港鐵/輕鐵",
      filtersTram: "電車",
      filtersFerry: "渡輪",
      typeRoute: "路線",
      typeStop: "站點",
      typePlace: "地點",
      loading: "載入中…",
      noResult: "沒有結果。可嘗試輸入更短關鍵字或切換篩選。",
      selectToSee: "選擇一條路線或一個站點後，這裡會顯示詳情與實時到站時間（ETA）。",
      updatedAt: "更新",
      direction: "方向",
      origin: "起點",
      destination: "終點",
      operator: "營運商",
      serviceType: "服務類型",
      bound: "方向代碼",
      stopName: "站名",
      stopId: "站點 ID",
      routeId: "路線 ID",
      eta: "到站",
      mins: "分鐘",
      arriving: "即將到達",
      noEta: "暫無 ETA",
      lastUpdate: "接口時間",
      platform: "站台/位置",
      remark: "備註",
    },
    "en": {
      title: "HK Transport Search",
      sub: "Frontend only · Official Open Data APIs · routes/stops/ETA",
      placeholder: "Search: route no. / route name / stop (e.g., 1A, Airport, Central, Mong Kok)",
      clear: "Clear",
      refresh: "Refresh ETA",
      dark: "Dark",
      light: "Light",
      results: "Results",
      detail: "Details",
      apiOnline: "APIs online",
      apiIssue: "APIs may be unavailable / rate-limited",
      hint: "Note: This tool only calls official open data APIs and never redirects. If an operator rate-limits, please retry later.",
      filtersAll: "All",
      filtersBus: "Bus",
      filtersGMB: "GMB",
      filtersMTR: "MTR/LRT",
      filtersTram: "Tram",
      filtersFerry: "Ferry",
      typeRoute: "Route",
      typeStop: "Stop",
      typePlace: "Place",
      loading: "Loading…",
      noResult: "No results. Try a shorter keyword or change filters.",
      selectToSee: "Select a route or a stop to see details and real-time ETA.",
      updatedAt: "Updated",
      direction: "Direction",
      origin: "Origin",
      destination: "Destination",
      operator: "Operator",
      serviceType: "Service type",
      bound: "Bound code",
      stopName: "Stop name",
      stopId: "Stop ID",
      routeId: "Route ID",
      eta: "ETA",
      mins: "min",
      arriving: "Arriving",
      noEta: "No ETA",
      lastUpdate: "API time",
      platform: "Platform/Loc",
      remark: "Remark",
    }
  };

  // ---------------------------
  // Official API endpoints (Gov Open Data)
  // ---------------------------
  const GOV_BUS_BASE = "https://rt.data.gov.hk/v2/transport/citybus-nwfb"; // Citybus / NWFB (and often KMB via separate endpoints below)
  const GOV_KMB_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
  const GOV_NLB_BASE = "https://rt.data.gov.hk/v2/transport/nlb";
  const GOV_GMB_BASE = "https://data.etagmb.gov.hk"; // GMB
  const GOV_MTR_BASE = "https://rt.data.gov.hk/v1/transport/mtr"; // MTR
  // Tram/Ferry datasets are less uniform; we include slots and try gov datasets where available via rt.data.gov.hk.
  // NOTE: Some services do not provide unified ETA via a single gov endpoint. We keep the UI modular and degrade gracefully.

  // ---------------------------
  // State
  // ---------------------------
  const state = {
    lang: "zh-Hans",
    theme: "dark",
    filter: "all", // all|bus|gmb|mtr|tram|ferry
    q: "",
    apiOk: true,

    // cached indexes
    busRoutes: [],         // combined KMB/CTB/NWFB/NLB as route objects
    busStops: new Map(),   // stopId -> stop object
    gmbRoutes: [],         // list of GMB routes (region+routeId)
    gmbStops: new Map(),   // stopId -> stop detail if available
    mtrStops: [],          // MTR stations (static list from API if available)
    inited: false,

    // selection
    selected: null,  // { kind, ... }
    etaTimer: null,
    etaRefreshSec: 30,
    lastEtaAt: 0,
  };

  // ---------------------------
  // Helpers
  // ---------------------------
  const $ = (id) => document.getElementById(id);
  const t = (k) => (I18N[state.lang] && I18N[state.lang][k]) || I18N["en"][k] || k;

  function setToast(msg, spinning=false, ms=2200){
    const el = $("toast");
    $("toastMsg").textContent = msg;
    $("toastSpin").style.display = spinning ? "inline-block" : "none";
    el.classList.add("show");
    if(ms > 0){
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove("show"), ms);
    }
  }

  function fmtLangText(obj){
    // Common fields: name_en, name_tc, name_sc
    if(!obj) return "";
    const lang = state.lang;
    if(lang === "en") return obj.en ?? obj.name_en ?? obj.english ?? obj.eng ?? obj.nameEn ?? "";
    if(lang === "zh-Hant") return obj.tc ?? obj.name_tc ?? obj.trad ?? obj.nameTc ?? obj.name_zh ?? "";
    return obj.sc ?? obj.name_sc ?? obj.simp ?? obj.nameSc ?? obj.name_zh ?? "";
  }

  function pickName3(sc, tc, en){
    if(state.lang === "en") return en || tc || sc || "";
    if(state.lang === "zh-Hant") return tc || sc || en || "";
    return sc || tc || en || "";
  }

  function norm(s){
    return (s || "").toString().trim().toLowerCase();
  }

  function debounce(fn, ms){
    let h;
    return (...args) => { clearTimeout(h); h = setTimeout(() => fn(...args), ms); };
  }

  function safeJson(x){
    if(!x) return null;
    if(typeof x === "object") return x;
    try { return JSON.parse(x); } catch { return null; }
  }

  async function fetchJson(url, opts={}){
    // Avoid caching issues; keep it simple
    const res = await fetch(url, { ...opts, headers: { "Accept":"application/json", ...(opts.headers||{}) } });
    if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return await res.json();
  }

  function setApiStatus(ok){
    state.apiOk = ok;
    $("statusDot").className = "dot " + (ok ? "ok" : "bad");
    $("statusText").textContent = ok ? t("apiOnline") : t("apiIssue");
  }

  function opLabel(op){
    // operator codes: KMB, CTB, NWFB, NLB, GMB, MTR, LRT, TRAM, FERRY
    const map = {
      KMB: "KMB",
      CTB: "Citybus",
      NWFB: "NWFB",
      NLB: "NLB",
      GMB: "GMB",
      MTR: "MTR",
      LRT: "LRT",
      TRAM: "Tram",
      FERRY: "Ferry"
    };
    return map[op] || op || "";
  }

  function nowIso(){
    return new Date().toISOString();
  }

  function minsUntil(isoTime){
    if(!isoTime) return null;
    const dt = new Date(isoTime).getTime();
    if(Number.isNaN(dt)) return null;
    const diff = Math.round((dt - Date.now())/60000);
    return diff;
  }

  function fmtEta(etaIso){
    const m = minsUntil(etaIso);
    if(m === null) return { main: t("noEta"), sub: "" };
    if(m <= 0) return { main: t("arriving"), sub: "" };
    return { main: `${m} ${t("mins")}`, sub: "" };
  }

  // ---------------------------
  // Data loaders (routes/stops indexes)
  // ---------------------------
  async function loadKmbIndex(){
    // routes
    const routes = await fetchJson(`${GOV_KMB_BASE}/route/`);
    const stops = await fetchJson(`${GOV_KMB_BASE}/stop/`);
    // routes.data: [{route, bound, service_type, orig_en, dest_en, orig_tc, dest_tc, orig_sc, dest_sc}, ...]
    // stops.data: [{stop, name_en, name_tc, name_sc, lat, long}, ...]
    const outRoutes = (routes.data || []).map(r => ({
      kind: "route",
      mode: "bus",
      operator: "KMB",
      route: r.route,
      bound: r.bound,
      serviceType: r.service_type,
      orig: pickName3(r.orig_sc, r.orig_tc, r.orig_en),
      dest: pickName3(r.dest_sc, r.dest_tc, r.dest_en),
      orig3: { sc:r.orig_sc, tc:r.orig_tc, en:r.orig_en },
      dest3: { sc:r.dest_sc, tc:r.dest_tc, en:r.dest_en },
      raw: r,
      id: `KMB|${r.route}|${r.bound}|${r.service_type}`
    }));
    for(const s of (stops.data || [])){
      state.busStops.set(`KMB:${s.stop}`, { ...s, operator:"KMB", id:`KMB:${s.stop}` });
    }
    return outRoutes;
  }

  async function loadCtbNwfbIndex(){
    // Gov v2 citybus-nwfb routes/stops
    // routes: /route/ctb or /route/nwfb ; stops: /stop ; stop detail: /stop/{stop_id}
    const [ctbRoutes, nwfbRoutes, stops] = await Promise.all([
      fetchJson(`${GOV_BUS_BASE}/route/ctb`),
      fetchJson(`${GOV_BUS_BASE}/route/nwfb`),
      fetchJson(`${GOV_BUS_BASE}/stop`)
    ]);

    const out = [];
    for(const r of (ctbRoutes.data || [])){
      out.push({
        kind:"route", mode:"bus", operator:"CTB",
        route: r.route, bound: r.bound || "", serviceType: r.service_type || "",
        orig: pickName3(r.orig_sc, r.orig_tc, r.orig_en),
        dest: pickName3(r.dest_sc, r.dest_tc, r.dest_en),
        orig3: { sc:r.orig_sc, tc:r.orig_tc, en:r.orig_en },
        dest3: { sc:r.dest_sc, tc:r.dest_tc, en:r.dest_en },
        raw: r,
        id: `CTB|${r.route}|${r.bound || ""}|${r.service_type || ""}`
      });
    }
    for(const r of (nwfbRoutes.data || [])){
      out.push({
        kind:"route", mode:"bus", operator:"NWFB",
        route: r.route, bound: r.bound || "", serviceType: r.service_type || "",
        orig: pickName3(r.orig_sc, r.orig_tc, r.orig_en),
        dest: pickName3(r.dest_sc, r.dest_tc, r.dest_en),
        orig3: { sc:r.orig_sc, tc:r.orig_tc, en:r.orig_en },
        dest3: { sc:r.dest_sc, tc:r.dest_tc, en:r.dest_en },
        raw: r,
        id: `NWFB|${r.route}|${r.bound || ""}|${r.service_type || ""}`
      });
    }

    // stops list includes stop ids; need per-stop detail to get multilingual names.
    // To keep it fast, we lazily fetch stop detail on demand, but we can also prefetch a limited number.
    // We'll store as placeholder; detail loader will fill names.
    for(const s of (stops.data || [])){
      state.busStops.set(`CTB:${s.stop}`, { stop:s.stop, operator:"CTB", id:`CTB:${s.stop}`, _partial:true });
      state.busStops.set(`NWFB:${s.stop}`, { stop:s.stop, operator:"NWFB", id:`NWFB:${s.stop}`, _partial:true });
    }
    return out;
  }

  async function loadNlbIndex(){
    // NLB routes list
    const routes = await fetchJson(`${GOV_NLB_BASE}/route.php?action=list`);
    const out = (routes.routes || routes.data || []).map(r => ({
      kind:"route", mode:"bus", operator:"NLB",
      route: r.routeNo || r.route || r.route_no || "",
      routeId: r.routeId || r.route_id || r.id || "",
      orig: pickName3(r.routeName_c, r.routeName_c, r.routeName_e), // NLB often uses c/e only
      dest: "", // NLB routeName usually already includes direction
      raw: r,
      id: `NLB|${r.routeId || r.route_id || r.id || r.routeNo || r.route || ""}`
    }));
    return out;
  }

  async function loadGmbIndex(){
    // GMB has multiple endpoints. We will:
    // - get route list by region (HK/KLN/NT)
    // - keep route_id + region for later stop/ETA fetching
    const regions = ["HKI","KLN","NT"];
    const results = [];
    for(const region of regions){
      try{
        const j = await fetchJson(`${GOV_GMB_BASE}/route/${region}`);
        // j.data: [{route_id, route_no, region, ...}...]
        for(const r of (j.data || [])){
          results.push({
            kind:"route", mode:"gmb", operator:"GMB",
            region: region,
            routeId: r.route_id,
            route: r.route_no,
            name: r.route_name || "",
            raw: r,
            id: `GMB|${region}|${r.route_id}`
          });
        }
      }catch(e){
        // continue region by region
      }
    }
    return results;
  }

  async function loadMtrIndex(){
    // Gov MTR has several datasets; station list is not always directly exposed.
    // We'll provide "MTR line code / station code" search using a minimal embedded list would violate "不写死".
    // So we only enable MTR ETA when user provides station code via query, and we show guidance.
    // We still keep a "mode" toggle for MTR and show how to query.
    return [];
  }

  async function ensureCtbStopDetail(stopId){
    // stopId like "CTB:XXXX" or "NWFB:XXXX"
    const s = state.busStops.get(stopId);
    if(!s || !s._partial) return s;
    const rawId = s.stop;
    const detail = await fetchJson(`${GOV_BUS_BASE}/stop/${rawId}`);
    // detail.data has name_tc/en/sc, lat, long
    const filled = { ...detail.data, operator: stopId.startsWith("NWFB:") ? "NWFB" : "CTB", id: stopId, _partial:false };
    state.busStops.set(stopId, filled);
    return filled;
  }

  async function initAll(){
    setToast(t("loading"), true, 0);
    try{
      const [kmbRoutes, ctbNwfbRoutes, nlbRoutes, gmbRoutes, mtrStops] = await Promise.all([
        loadKmbIndex().catch(()=>[]),
        loadCtbNwfbIndex().catch(()=>[]),
        loadNlbIndex().catch(()=>[]),
        loadGmbIndex().catch(()=>[]),
        loadMtrIndex().catch(()=>[]),
      ]);
      state.busRoutes = [...kmbRoutes, ...ctbNwfbRoutes, ...nlbRoutes];
      state.gmbRoutes = gmbRoutes;

      setToast(`${t("apiIssue")}: ${e.message}`, false, 3800);
    }

  // ---------------------------
  // Search model
  // ---------------------------
  function getActiveModes(){
    const f = state.filter;
    if(f === "all") return ["bus","gmb","mtr","tram","ferry"];
    if(f === "bus") return ["bus"];
    if(f === "gmb") return ["gmb"];
    if(f === "mtr") return ["mtr"];
    if(f === "tram") return ["tram"];
    if(f === "ferry") return ["ferry"];
    return ["bus","gmb"];
  }

  function buildStopSearchIndex(){
    // Use what we have: KMB stop names are available; CTB/NWFB require lazy detail.
    const qn = norm(state.q);
    if(!qn) return [];
    const out = [];
    for(const [id, s] of state.busStops.entries()){
      if(s._partial) continue; // skip partial (no name yet) in global stop search to keep it correct
      const name = pickName3(s.name_sc, s.name_tc, s.name_en);
      const hay = norm(`${id} ${s.stop} ${s.name_en||""} ${s.name_tc||""} ${s.name_sc||""}`);
      if(hay.includes(qn)){
        out.push({
          kind:"stop",
          mode:"bus",
          operator: s.operator,
          stop: s.stop,
          name,
          name3: { sc:s.name_sc, tc:s.name_tc, en:s.name_en },
          lat: s.lat, long: s.long,
          id
        });
      }
    }
    return out.slice(0, 40);
  }

  function searchRoutes(){
    const qn = norm(state.q);
    const modes = new Set(getActiveModes());
    const res = [];

    if(modes.has("bus")){
      for(const r of state.busRoutes){
        const hay = norm([
          r.operator, r.route, r.bound, r.serviceType,
          r.raw?.orig_en, r.raw?.orig_tc, r.raw?.orig_sc,
          r.raw?.dest_en, r.raw?.dest_tc, r.raw?.dest_sc,
          r.raw?.routeName_e, r.raw?.routeName_c,
          r.orig, r.dest
        ].filter(Boolean).join(" "));
        if(!qn || hay.includes(qn)){
          res.push(r);
        }
      }
    }

    if(modes.has("gmb")){
      for(const r of state.gmbRoutes){
        const hay = norm([r.route, r.routeId, r.region, r.name, safeJson(r.raw)?.route_name, safeJson(r.raw)?.route_no].filter(Boolean).join(" "));
        if(!qn || hay.includes(qn)){
          res.push(r);
        }
      }
    }

    // MTR/Tram/Ferry: kept as placeholders (no hardcoded data). We show guidance item when filtered and query non-empty.
    if(modes.has("mtr") && qn){
      res.push({
        kind:"place",
        mode:"mtr",
        operator:"MTR",
        id:"MTR_PLACEHOLDER",
        title: "MTR ETA（需要站点代码）",
        desc: state.lang === "en"
          ? "Gov MTR ETA endpoint requires Line/Station codes. Search by station code (e.g., TUC, HOK) if you have it."
          : (state.lang === "zh-Hant"
              ? "港鐵 ETA 介面需要「線路/車站代碼」。如你有代碼（例如 TUC、HOK）可直接輸入搜尋。"
              : "港铁 ETA 接口需要「线路/车站代码」。如你有代码（例如 TUC、HOK）可直接输入搜索。")
      });
    }

    return res;
  }

  function runSearch(){
    const qn = norm(state.q);
    const modes = getActiveModes();
    const list = [];

    // Route matches first
    const routes = searchRoutes();
    for(const r of routes){
      if(r.kind === "route") list.push(r);
      else list.push(r); // placeholder items
    }

    // Stop matches (bus only, with known names)
    if(modes.includes("bus") && qn){
      const stops = buildStopSearchIndex();
      for(const s of stops) list.push(s);
    }

    // rank: exact route no first
    list.sort((a,b) => {
      const qa = (a.route || a.stop || a.title || "");
      const qb = (b.route || b.stop || b.title || "");
      const q = state.q.trim();
      const ea = (qa.toString().toLowerCase() === q.toLowerCase()) ? 1 : 0;
      const eb = (qb.toString().toLowerCase() === q.toLowerCase()) ? 1 : 0;
      if(ea !== eb) return eb - ea;
      return (qa+"").localeCompare(qb+"");
    });

    const limited = list.slice(0, 80);
    renderResults(limited);
  }

  // ---------------------------
  // ETA loaders (dynamic per selection)
  // ---------------------------
  async function fetchKmbEta(route, serviceType, stopId){
    // /eta/{stop}/{route}/{service_type}
    const j = await fetchJson(`${GOV_KMB_BASE}/eta/${encodeURIComponent(stopId)}/${encodeURIComponent(route)}/${encodeURIComponent(serviceType)}`);
    return (j.data || []).map(x => ({
      operator:"KMB",
      route: x.route,
      dir: x.dir,
      seq: x.seq,
      dest: pickName3(x.dest_sc, x.dest_tc, x.dest_en),
      eta: x.eta,
      rmk: pickName3(x.rmk_sc, x.rmk_tc, x.rmk_en),
      timestamp: x.data_timestamp,
    }));
  }

  async function fetchCtbEta(company, stopId, route){
    // /eta/{company}/{stop_id}/{route}
    const j = await fetchJson(`${GOV_BUS_BASE}/eta/${company}/${encodeURIComponent(stopId)}/${encodeURIComponent(route)}`);
    return (j.data || []).map(x => ({
      operator: company.toUpperCase(),
      route: x.route,
      dir: x.dir,
      seq: x.seq,
      dest: pickName3(x.dest_sc, x.dest_tc, x.dest_en),
      eta: x.eta,
      rmk: pickName3(x.rmk_sc, x.rmk_tc, x.rmk_en),
      timestamp: x.data_timestamp,
    }));
  }

  async function fetchNlbEta(routeId, stopId){
    // NLB ETA: route.php?action=estimatedArrivalTime&routeId=...&stopId=...
    const j = await fetchJson(`${GOV_NLB_BASE}/route.php?action=estimatedArrivalTime&routeId=${encodeURIComponent(routeId)}&stopId=${encodeURIComponent(stopId)}`);
    const rows = (j.estimatedArrivals || j.data || []);
    return rows.map(x => ({
      operator:"NLB",
      route: x.routeNo || "",
      dir: x.direction || "",
      seq: x.stopSequence || x.seq || "",
      dest: x.destination || "",
      eta: x.estimatedArrivalTime || x.eta || "",
      rmk: x.remarks || "",
      timestamp: j.generatedTimestamp || j.time || "",
    }));
  }

  async function fetchGmbEta(routeId, stopId){
    // GMB ETA commonly: /eta/route-stop/{route_id}/{stop_id}
    // Some deployments: /eta/route-stop/{route_id}/{stop_id}
    const j = await fetchJson(`${GOV_GMB_BASE}/eta/route-stop/${encodeURIComponent(routeId)}/${encodeURIComponent(stopId)}`);
    return (j.data || []).map(x => ({
      operator:"GMB",
      route: x.route_no || "",
      dir: x.direction || x.dir || "",
      seq: x.stop_seq || x.seq || "",
      dest: x.dest || "",
      eta: x.timestamp || x.eta || x.eta_timestamp || "",
      rmk: x.remark || x.remarks || "",
      timestamp: j.generated_timestamp || j.generatedTimestamp || "",
      platform: x.location || x.platform || ""
    }));
  }

  async function fetchStopsOfRouteKmb(route, bound, serviceType){
    // /route-stop/{route}/{bound}/{service_type}
    const j = await fetchJson(`${GOV_KMB_BASE}/route-stop/${encodeURIComponent(route)}/${encodeURIComponent(bound)}/${encodeURIComponent(serviceType)}`);
    return (j.data || []).map(x => ({
      stop: x.stop,
      seq: x.seq
    }));
  }

  async function fetchStopsOfRouteCtb(company, route, direction){
    // /route-stop/{company}/{route}/{direction}
    const j = await fetchJson(`${GOV_BUS_BASE}/route-stop/${company}/${encodeURIComponent(route)}/${encodeURIComponent(direction)}`);
    return (j.data || []).map(x => ({
      stop: x.stop,
      seq: x.seq
    }));
  }

  // ---------------------------
  // Rendering
  // ---------------------------
  function renderFilters(){
    const el = $("filters");
    const items = [
      { id:"all",  label:t("filtersAll") },
      { id:"bus",  label:t("filtersBus") },
      { id:"gmb",  label:t("filtersGMB") },
      { id:"mtr",  label:t("filtersMTR") },
      { id:"tram", label:t("filtersTram") },
      { id:"ferry",label:t("filtersFerry") },
    ];
    el.innerHTML = "";
    for(const it of items){
      const b = document.createElement("button");
      b.className = "chip";
      b.type = "button";
      b.setAttribute("aria-pressed", String(state.filter === it.id));
      b.textContent = it.label;
      b.onclick = () => {
        state.filter = it.id;
        renderFilters();
        runSearch();
      };
      el.appendChild(b);
    }
  }

  function renderResults(items){
    $("resTitle").textContent = t("results");
    const meta = [
      `${t("updatedAt")}: ${new Date().toLocaleString()}`,
      `Q="${state.q.trim() || "—"}"`,
      `#${items.length}`
    ].join(" · ");
    $("resMeta").textContent = meta;

    const box = $("results");
    box.innerHTML = "";

    if(!items.length){
      const div = document.createElement("div");
      div.className = "muted";
      div.style.padding = "10px 2px";
      div.textContent = t("noResult");
      box.appendChild(div);
      return;
    }

    for(const it of items){
      const row = document.createElement("div");
      row.className = "row";

      if(it.kind === "route"){
        const name = it.mode === "gmb"
          ? (it.name || "")
          : `${pickName3(it.orig3?.sc, it.orig3?.tc, it.orig3?.en)} → ${pickName3(it.dest3?.sc, it.dest3?.tc, it.dest3?.en)}`;

        const desc = it.mode === "gmb"
          ? `${opLabel(it.operator)} · ${it.region || ""} · ${t("typeRoute")}`
          : `${opLabel(it.operator)} · ${t("typeRoute")} · ${t("bound")}: ${it.bound || "—"} · ${t("serviceType")}: ${it.serviceType || "—"}`;

        row.innerHTML = `
          <div class="top">
            <div style="min-width:0">
              <div class="name">${escapeHtml(it.route || "")}</div>
              <div class="desc">${escapeHtml(name || "")}</div>
              <div class="desc">${escapeHtml(desc || "")}</div>
            </div>
            <div class="badge">${escapeHtml(it.mode.toUpperCase())}</div>
          </div>
        `;
        row.onclick = () => selectItem(it);

      } else if(it.kind === "stop"){
        row.innerHTML = `
          <div class="top">
            <div style="min-width:0">
              <div class="name">${escapeHtml(it.name || "")}</div>
              <div class="desc">${escapeHtml(opLabel(it.operator))} · ${t("typeStop")} · <span class="mono">${escapeHtml(it.stop)}</span></div>
            </div>
            <div class="badge">${escapeHtml(it.operator)}</div>
          </div>
        `;
        row.onclick = () => selectItem(it);

      } else {
        row.innerHTML = `
          <div class="top">
            <div style="min-width:0">
              <div class="name">${escapeHtml(it.title || "")}</div>
              <div class="desc">${escapeHtml(it.desc || "")}</div>
            </div>
            <div class="badge">${escapeHtml((it.mode||"").toUpperCase())}</div>
          </div>
        `;
        row.onclick = () => selectItem(it);
      }

      box.appendChild(row);
    }
  }

  function escapeHtml(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function renderDetailEmpty(){
    $("detailTitle").textContent = t("detail");
    $("detailMeta").textContent = "—";
    $("detail").innerHTML = `<div class="muted" id="detailEmpty" style="line-height:1.45;">${escapeHtml(t("selectToSee"))}</div>`;
  }

  async function selectItem(it){
    state.selected = it;
    if(state.etaTimer) clearInterval(state.etaTimer);
    $("detail").innerHTML = `<div class="muted">${escapeHtml(t("loading"))}</div>`;
    $("detailTitle").textContent = t("detail");
    $("detailMeta").textContent = (it.kind === "route")
      ? `${it.operator} · ${it.route || it.routeId || ""}`
      : (it.kind === "stop" ? `${it.operator} · ${it.stop}` : it.id);

    await refreshEta(true);

    state.etaTimer = setInterval(() => refreshEta(false), state.etaRefreshSec * 1000);
  }

  async function refreshEta(showToast){
    const sel = state.selected;
    if(!sel) return;

    if(showToast){
      $("refreshSpin").style.display = "inline-block";
      setToast(t("loading"), true, 0);
    }else{
      $("refreshSpin").style.display = "none";
    }

    try{
      let html = "";

      if(sel.kind === "route"){
        html = await renderRouteDetail(sel);
      } else if(sel.kind === "stop"){
        html = await renderStopDetail(sel);
      } else {
        html = `
          <div class="muted">${escapeHtml(sel.desc || "")}</div>
          <div class="divider"></div>
          <div class="muted tiny">${escapeHtml(t("hint"))}</div>
        `;
      }

      $("detail").innerHTML = html;
      setApiStatus(true);
      state.lastEtaAt = Date.now();
      $("refreshSpin").style.display = "none";
      if(showToast){
        setToast(`${t("updatedAt")}: ${new Date().toLocaleTimeString()}`, false, 1200);
      }else{
        $("toast").classList.remove("show");
      }
    }catch(e){
      $("refreshSpin").style.display = "none";
      setApiStatus(false);
      if(showToast){
        setToast(`${t("apiIssue")}: ${e.message}`, false, 3200);
      }
      // keep previous detail if any
    }
  }

  async function renderRouteDetail(r){
    // For routes, show stop list (first N) and allow tap a stop to load ETA
    if(r.operator === "KMB"){
      const stops = await fetchStopsOfRouteKmb(r.route, r.bound, r.serviceType);
      const head = `
        <div class="kv">
          <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(r.operator))}</div>
          <div>${escapeHtml(t("routeId"))}</div><div class="mono">${escapeHtml(r.id)}</div>
          <div>${escapeHtml(t("origin"))}</div><div>${escapeHtml(pickName3(r.orig3.sc, r.orig3.tc, r.orig3.en))}</div>
          <div>${escapeHtml(t("destination"))}</div><div>${escapeHtml(pickName3(r.dest3.sc, r.dest3.tc, r.dest3.en))}</div>
          <div>${escapeHtml(t("bound"))}</div><div class="mono">${escapeHtml(r.bound)}</div>
          <div>${escapeHtml(t("serviceType"))}</div><div class="mono">${escapeHtml(r.serviceType)}</div>
        </div>
        <div class="divider"></div>
        <div class="tiny muted">${escapeHtml(t("stopName"))} / ${escapeHtml(t("stopId"))} — 点击站点查看 ETA</div>
      `;

      // ensure first page stop details (names)
      const stopRows = [];
      const limited = stops.slice(0, 50);
      for(const s of limited){
        const sid = `KMB:${s.stop}`;
        const sd = state.busStops.get(sid);
        const nm = sd ? pickName3(sd.name_sc, sd.name_tc, sd.name_en) : s.stop;
        stopRows.push({ stop:s.stop, seq:s.seq, name:nm });
      }

      let list = `<div class="list" style="margin-top:10px">`;
      for(const s of stopRows){
        list += `
          <div class="row" data-stop="${escapeHtml(s.stop)}">
            <div class="top">
              <div style="min-width:0">
                <div class="name">${escapeHtml(s.name)}</div>
                <div class="desc">${escapeHtml(t("stopId"))}: <span class="mono">${escapeHtml(s.stop)}</span> · ${escapeHtml(t("direction"))}: <span class="mono">${escapeHtml(r.bound)}</span> · seq <span class="mono">${escapeHtml(s.seq)}</span></div>
              </div>
              <div class="badge">ETA</div>
            </div>
          </div>
        `;
      }
      list += `</div>`;

      // attach click handlers after render
      queueMicrotask(() => {
        $("detail").querySelectorAll('[data-stop]').forEach(el => {
          el.addEventListener("click", async () => {
            const stopId = el.getAttribute("data-stop");
            const stopObj = { kind:"stop", mode:"bus", operator:"KMB", stop: stopId, id:`KMB:${stopId}` };
            // keep route context for ETA
            state.selected = { ...r, _focusStop: stopObj };
            await refreshEta(true);
          });
        });
      });

      // If user tapped a stop from within route detail
      if(r._focusStop){
        const etas = await fetchKmbEta(r.route, r.serviceType, r._focusStop.stop);
        const stopDet = state.busStops.get(`KMB:${r._focusStop.stop}`);
        const stopName = stopDet ? pickName3(stopDet.name_sc, stopDet.name_tc, stopDet.name_en) : r._focusStop.stop;
        return head + `
          <div class="divider"></div>
          <div class="kv">
            <div>${escapeHtml(t("stopName"))}</div><div>${escapeHtml(stopName)}</div>
            <div>${escapeHtml(t("stopId"))}</div><div class="mono">${escapeHtml(r._focusStop.stop)}</div>
          </div>
          ${renderEtaList(etas)}
          <div class="divider"></div>
          ${list}
        `;
      }

      return head + list;
    }

    if(r.operator === "CTB" || r.operator === "NWFB"){
      const company = (r.operator === "CTB") ? "ctb" : "nwfb";
      const direction = r.bound || "outbound";
      const stops = await fetchStopsOfRouteCtb(company, r.route, direction);
      const head = `
        <div class="kv">
          <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(r.operator))}</div>
          <div>${escapeHtml(t("routeId"))}</div><div class="mono">${escapeHtml(r.id)}</div>
          <div>${escapeHtml(t("origin"))}</div><div>${escapeHtml(pickName3(r.orig3.sc, r.orig3.tc, r.orig3.en))}</div>
          <div>${escapeHtml(t("destination"))}</div><div>${escapeHtml(pickName3(r.dest3.sc, r.dest3.tc, r.dest3.en))}</div>
          <div>${escapeHtml(t("bound"))}</div><div class="mono">${escapeHtml(r.bound || "—")}</div>
        </div>
        <div class="divider"></div>
        <div class="tiny muted">${escapeHtml(t("stopName"))} / ${escapeHtml(t("stopId"))} — 点击站点查看 ETA</div>
      `;

      // Pre-fetch stop details for first 30 stops to enable stop name search in this view
      const stopRows = [];
      const limited = stops.slice(0, 50);
      for(const s of limited){
        const sid = `${r.operator}:${s.stop}`;
        const sd = await ensureCtbStopDetail(sid).catch(()=>null);
        const nm = sd ? pickName3(sd.name_sc, sd.name_tc, sd.name_en) : s.stop;
        stopRows.push({ stop:s.stop, seq:s.seq, name:nm });
      }

      let list = `<div class="list" style="margin-top:10px">`;
      for(const s of stopRows){
        list += `
          <div class="row" data-stop="${escapeHtml(s.stop)}">
            <div class="top">
              <div style="min-width:0">
                <div class="name">${escapeHtml(s.name)}</div>
                <div class="desc">${escapeHtml(t("stopId"))}: <span class="mono">${escapeHtml(s.stop)}</span> · ${escapeHtml(t("direction"))}: <span class="mono">${escapeHtml(direction)}</span> · seq <span class="mono">${escapeHtml(s.seq)}</span></div>
              </div>
              <div class="badge">ETA</div>
            </div>
          </div>
        `;
      }
      list += `</div>`;

      queueMicrotask(() => {
        $("detail").querySelectorAll('[data-stop]').forEach(el => {
          el.addEventListener("click", async () => {
            const stopId = el.getAttribute("data-stop");
            state.selected = { ...r, _focusStop: { stop: stopId } };
            await refreshEta(true);
          });
        });
      });

      if(r._focusStop){
        const etas = await fetchCtbEta(company, r._focusStop.stop, r.route);
        const sd = await ensureCtbStopDetail(`${r.operator}:${r._focusStop.stop}`).catch(()=>null);
        const stopName = sd ? pickName3(sd.name_sc, sd.name_tc, sd.name_en) : r._focusStop.stop;

        return head + `
          <div class="divider"></div>
          <div class="kv">
            <div>${escapeHtml(t("stopName"))}</div><div>${escapeHtml(stopName)}</div>
            <div>${escapeHtml(t("stopId"))}</div><div class="mono">${escapeHtml(r._focusStop.stop)}</div>
          </div>
          ${renderEtaList(etas)}
          <div class="divider"></div>
          ${list}
        `;
      }

      return head + list;
    }

    if(r.operator === "NLB"){
      // NLB requires routeId + stopId for ETA; route list alone can't show stops without more calls.
      return `
        <div class="kv">
          <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(r.operator))}</div>
          <div>${escapeHtml(t("routeId"))}</div><div class="mono">${escapeHtml(r.routeId || r.id)}</div>
          <div>${escapeHtml(t("remark"))}</div><div class="muted">${escapeHtml(state.lang==="en"
            ? "For NLB ETA you need a stopId. Use stop search or query NLB route stops API if enabled."
            : (state.lang==="zh-Hant"
                ? "嶼巴 ETA 需要 stopId。請先用站點搜尋，或開啟查詢路線站序（如介面可用）。"
                : "屿巴 ETA 需要 stopId。请先用站点搜索，或开启查询路线站序（如接口可用）。"))}</div>
        </div>
      `;
    }

    if(r.operator === "GMB"){
      // Need stop id to get ETA; route-stop list requires extra endpoint; keep minimal.
      return `
        <div class="kv">
          <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(r.operator))}</div>
          <div>${escapeHtml(t("routeId"))}</div><div class="mono">${escapeHtml(r.id)}</div>
          <div>${escapeHtml(t("remark"))}</div><div class="muted">${escapeHtml(state.lang==="en"
            ? "GMB ETA requires a stopId. Search a stop (if available) or provide a stopId from official data."
            : (state.lang==="zh-Hant"
                ? "綠小 ETA 需要 stopId。請先搜尋站點（如已載入），或使用官方數據取得 stopId。"
                : "绿小 ETA 需要 stopId。请先搜索站点（如已载入），或使用官方数据取得 stopId。"))}</div>
        </div>
      `;
    }

    return `<div class="muted">${escapeHtml(t("noEta"))}</div>`;
  }

  function renderEtaList(etas){
    if(!etas || !etas.length){
      return `<div class="divider"></div><div class="muted">${escapeHtml(t("noEta"))}</div>`;
    }

    // Sort by eta time ascending when possible
    const sorted = [...etas].sort((a,b)=>{
      const ta = new Date(a.eta || 0).getTime();
      const tb = new Date(b.eta || 0).getTime();
      if(Number.isNaN(ta) && Number.isNaN(tb)) return 0;
      if(Number.isNaN(ta)) return 1;
      if(Number.isNaN(tb)) return -1;
      return ta - tb;
    }).slice(0, 10);

    let html = `<div class="eta">`;
    for(const x of sorted){
      const etaFmt = fmtEta(x.eta);
      const dest = x.dest || "";
      const rmk = x.rmk || "";
      const ts = x.timestamp || "";
      html += `
        <div class="item">
          <div class="l" style="min-width:0">
            <div class="t">${escapeHtml(`${x.route || ""} ${dest ? "→ " + dest : ""}`.trim())}</div>
            <div class="s">
              ${escapeHtml([rmk, ts ? `${t("lastUpdate")}: ${ts}` : ""].filter(Boolean).join(" · "))}
            </div>
          </div>
          <div class="r">${escapeHtml(etaFmt.main)}</div>
        </div>
      `;
    }
    html += `</div>`;
    return html;
  }

  async function renderStopDetail(s){
    // Stop-only view: show ETA for this stop for known operators.
    if(s.operator === "KMB"){
      // Without route context, KMB provides /stop-eta/{stop}? There isn't a universal endpoint in KMB v1.
      // We will show a helpful note.
      const stopDet = state.busStops.get(s.id);
      const name = stopDet ? pickName3(stopDet.name_sc, stopDet.name_tc, stopDet.name_en) : (s.name||s.stop);
      return `
        <div class="kv">
          <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(s.operator))}</div>
          <div>${escapeHtml(t("stopName"))}</div><div>${escapeHtml(name)}</div>
          <div>${escapeHtml(t("stopId"))}</div><div class="mono">${escapeHtml(s.stop)}</div>
          <div>${escapeHtml(t("remark"))}</div>
          <div class="muted">${escapeHtml(state.lang==="en"
            ? "For KMB, ETA is provided by stop+route+service_type. Please select a route first, then tap a stop to view ETA."
            : (state.lang==="zh-Hant"
                ? "九巴 ETA 需要「站點 + 路線 + 服務類型」。請先選擇路線，再點擊站點查看 ETA。"
                : "九巴 ETA 需要「站点 + 路线 + 服务类型」。请先选择路线，再点击站点查看 ETA。"))}</div>
        </div>
      `;
    }

    if(s.operator === "CTB" || s.operator === "NWFB"){
      // CTB/NWFB stop-level ETA endpoint exists: /stop/{stop_id}
      const sd = await ensureCtbStopDetail(s.id);
      const name = pickName3(sd.name_sc, sd.name_tc, sd.name_en);
      // But ETA still needs route in that endpoint we used; there is also /stop-eta? not in this API.
      return `
        <div class="kv">
          <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(s.operator))}</div>
          <div>${escapeHtml(t("stopName"))}</div><div>${escapeHtml(name)}</div>
          <div>${escapeHtml(t("stopId"))}</div><div class="mono">${escapeHtml(sd.stop)}</div>
          <div>${escapeHtml(t("remark"))}</div>
          <div class="muted">${escapeHtml(state.lang==="en"
            ? "Citybus/NWFB ETA is exposed per route+stop. Please select a route, then tap this stop inside the route to view ETA."
            : (state.lang==="zh-Hant"
                ? "城巴/新巴 ETA 以「路線 + 站點」提供。請先選擇路線，再在站序中點擊該站查看 ETA。"
                : "城巴/新巴 ETA 以「路线 + 站点」提供。请先选择路线，再在站序中点击该站查看 ETA。"))}</div>
        </div>
      `;
    }

    // For GMB stop ETA we need routeId+stopId; stop-only doesn't carry routeId.
    return `
      <div class="kv">
        <div>${escapeHtml(t("operator"))}</div><div>${escapeHtml(opLabel(s.operator))}</div>
        <div>${escapeHtml(t("stopId"))}</div><div class="mono">${escapeHtml(s.stop || s.id || "")}</div>
      </div>
      <div class="divider"></div>
      <div class="muted">${escapeHtml(t("noEta"))}</div>
    `;
  }

  // ---------------------------
  // UI wiring
  // ---------------------------
  function applyLang(){
    document.documentElement.lang = state.lang;
    $("uiTitle").textContent = t("title");
    $("uiSub").textContent = t("sub");
    $("q").placeholder = t("placeholder");
    $("clearBtn").textContent = t("clear");
    $("refreshText").textContent = t("refresh");
    $("resTitle").textContent = t("results");
    $("detailTitle").textContent = t("detail");
    $("hint").textContent = t("hint");
    $("statusText").textContent = state.apiOk ? t("apiOnline") : t("apiIssue");
    $("themeText").textContent = (state.theme === "dark") ? t("dark") : t("light");
    renderFilters();
    runSearch();
    if(!state.selected) renderDetailEmpty();
    else refreshEta(false);
  }

  function applyTheme(){
    $("app").setAttribute("data-theme", state.theme);
    $("themeDot").className = "dot " + (state.theme === "dark" ? "ok" : "ok");
    $("themeText").textContent = (state.theme === "dark") ? t("dark") : t("light");
  }

  $("langSel").addEventListener("change", (e) => {
    state.lang = e.target.value;
    applyLang();
  });

  $("themeBtn").addEventListener("click", () => {
    state.theme = (state.theme === "dark") ? "light" : "dark";
    applyTheme();
  });

  $("refreshBtn").addEventListener("click", () => refreshEta(true));

  $("clearBtn").addEventListener("click", () => {
    state.q = "";
    $("q").value = "";
    runSearch();
  });

  $("q").addEventListener("input", debounce((e) => {
    state.q = e.target.value;
    runSearch();
  }, 120));

  // ---------------------------
  // Boot
  // ---------------------------
  applyTheme();
  applyLang();
  renderDetailEmpty();
  initAll();

})();
</script>
</body>
</html>
