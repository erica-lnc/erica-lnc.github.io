<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>香港交通实时查询 · 多式联运ETA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --border: #cbd5e1;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --eta-ok: #059669;
            --eta-warn: #b45309;
            --header-bg: #ffffff;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --card-bg: #1e293b;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
            --eta-ok: #34d399;
            --eta-warn: #fbbf24;
            --header-bg: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* 头部 */
        .header {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(145deg, #2563eb, #1e40af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        body.dark .logo h1 {
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toolbar {
            display: flex;
            gap: 12px;
        }

        .lang-switch, .theme-switch {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .lang-switch:hover, .theme-switch:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 查询面板 */
        .search-panel {
            background: var(--surface);
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .transport-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            margin-bottom: 24px;
            align-items: center;
        }

        .transport-label {
            font-weight: 600;
            color: var(--text-light);
            padding-right: 8px;
        }

        .transport-option {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
        }

        .transport-option button {
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .transport-option button.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .route-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .input-group {
            flex: 2 1 260px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-light);
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
            transition: border 0.15s;
        }
        .input-group input:focus {
            border-color: var(--primary);
        }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px 36px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px -6px var(--primary);
            transition: background 0.15s, transform 0.1s;
            flex: 0 0 auto;
            border: 1px solid var(--primary);
        }
        .search-btn:hover {
            background: var(--primary-hover);
        }
        .search-btn:active {
            transform: scale(0.97);
        }

        /* 结果区 */
        .results {
            background: var(--surface);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .results-title {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .stats {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .eta-card {
            background: var(--bg);
            border-radius: 20px;
            padding: 18px 20px;
            border-left: 6px solid var(--primary);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            transition: 0.1s;
        }

        .eta-route {
            font-weight: 700;
            font-size: 1.3rem;
            min-width: 80px;
            color: var(--primary);
        }

        .eta-direction {
            font-size: 0.95rem;
            color: var(--text-light);
            background: var(--surface);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .eta-stop {
            flex: 2;
            margin: 0 16px;
            font-weight: 500;
            word-break: break-word;
        }

        .eta-time {
            font-weight: 700;
            font-size: 1.2rem;
            background: var(--surface);
            padding: 6px 18px;
            border-radius: 40px;
            color: var(--eta-ok);
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .eta-time.warn {
            color: var(--eta-warn);
        }

        .placeholder {
            color: var(--text-light);
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
        }

        .error-box {
            background: #fee2e2;
            border: 1px solid #f87171;
            color: #b91c1c;
            padding: 16px 20px;
            border-radius: 20px;
            margin: 16px 0;
        }
        body.dark .error-box {
            background: #451a1a;
            border-color: #b91c1c;
            color: #fecaca;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* 滚动条 */
        .eta-list::-webkit-scrollbar {
            width: 8px;
        }
        .eta-list::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }
        .eta-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">
                <h1 data-i18n="appTitle">🚍 香港交通ETA</h1>
            </div>
            <div class="toolbar">
                <div class="lang-switch" id="langToggle">
                    <span>🌐</span> <span data-i18n="langBtn">简体</span>
                </div>
                <div class="theme-switch" id="themeToggle">
                    <span>🌓</span> <span data-i18n="themeBtn">深色</span>
                </div>
            </div>
        </div>

        <!-- 查询区 -->
        <div class="search-panel">
            <div class="transport-grid">
                <span class="transport-label" data-i18n="transportLabel">交通方式：</span>
                <div class="transport-option" id="transportButtons">
                    <button data-transport="kmb" class="active">九巴</button>
                    <button data-transport="ctb">城巴</button>
                    <button data-transport="gmb">小巴</button>
                    <button data-transport="mtr">港铁</button>
                    <button data-transport="tram">电车</button>
                    <button data-transport="ferry">渡轮</button>
                    <button data-transport="lrt">轻铁</button>
                </div>
            </div>

            <div class="route-input-area">
                <div class="input-group">
                    <label data-i18n="routeLabel">路线号码</label>
                    <input type="text" id="routeInput" placeholder="例: 1, 170, 港岛线" value="1">
                </div>
                <button class="search-btn" id="searchBtn" data-i18n="searchBtn">🔍 查询实时</button>
            </div>
        </div>

        <!-- 结果展示区 -->
        <div class="results" id="resultsPanel">
            <div class="results-header">
                <span class="results-title" data-i18n="resultTitle">实时到站</span>
                <span class="stats" id="statsInfo"></span>
            </div>
            <div id="etaContainer" class="eta-list">
                <div class="placeholder" data-i18n="initPlaceholder">输入路线并点击查询</div>
            </div>
        </div>
        <footer>
            <span data-i18n="footer">数据来源：香港政府公共交通API · 实时调用</span>
        </footer>
    </div>

    <script>
        (function() {
            // ---------- 多语言词典 ----------
            const i18n = {
                zh: {
                    appTitle: '🚍 香港交通ETA',
                    langBtn: '简体',
                    themeBtn: '深色',
                    transportLabel: '交通方式：',
                    routeLabel: '路线号码',
                    searchBtn: '🔍 查询实时',
                    resultTitle: '实时到站',
                    initPlaceholder: '输入路线并点击查询',
                    footer: '数据来源：香港政府公共交通API · 实时调用',
                    directionOut: '往',
                    directionIn: '返',
                    directionUnknown: '方向未知',
                    etaNow: '即将到站',
                    etaMin: '分钟',
                    etaArriving: '到达',
                    noEta: '无实时数据',
                    errorFetch: '请求失败，可能是路线无效或API暂时不可用',
                    statsItem: (n) => `找到 ${n} 个到站预测`,
                    loading: '载入中...',
                    kmb: '九巴',
                    ctb: '城巴',
                    gmb: '小巴',
                    mtr: '港铁',
                    tram: '电车',
                    ferry: '渡轮',
                    lrt: '轻铁'
                },
                zhHant: {
                    appTitle: '🚍 香港交通ETA',
                    langBtn: '繁體',
                    themeBtn: '深色',
                    transportLabel: '交通方式：',
                    routeLabel: '路線號碼',
                    searchBtn: '🔍 查詢實時',
                    resultTitle: '實時到站',
                    initPlaceholder: '輸入路線並點擊查詢',
                    footer: '數據來源：香港政府公共交通API · 實時調用',
                    directionOut: '往',
                    directionIn: '返',
                    directionUnknown: '方向未知',
                    etaNow: '即將到站',
                    etaMin: '分鐘',
                    etaArriving: '到達',
                    noEta: '無實時數據',
                    errorFetch: '請求失敗，可能路線無效或API暫時不可用',
                    statsItem: (n) => `找到 ${n} 個到站預測`,
                    loading: '載入中...',
                    kmb: '九巴',
                    ctb: '城巴',
                    gmb: '小巴',
                    mtr: '港鐵',
                    tram: '電車',
                    ferry: '渡輪',
                    lrt: '輕鐵'
                },
                en: {
                    appTitle: '🚍 HK Transport ETA',
                    langBtn: 'English',
                    themeBtn: 'Dark',
                    transportLabel: 'Mode:',
                    routeLabel: 'Route No.',
                    searchBtn: '🔍 Search',
                    resultTitle: 'Real-time ETA',
                    initPlaceholder: 'Enter route & search',
                    footer: 'Data: HK Govt Transport API · Live',
                    directionOut: 'Outbound',
                    directionIn: 'Inbound',
                    directionUnknown: 'Unknown',
                    etaNow: 'Arriving',
                    etaMin: 'min',
                    etaArriving: 'Due',
                    noEta: 'No ETA',
                    errorFetch: 'Request failed. Invalid route or API issue.',
                    statsItem: (n) => `${n} predictions found`,
                    loading: 'Loading...',
                    kmb: 'KMB',
                    ctb: 'CTB',
                    gmb: 'GMB',
                    mtr: 'MTR',
                    tram: 'Tram',
                    ferry: 'Ferry',
                    lrt: 'LRT'
                }
            };

            let currentLang = 'zh'; // 默认简体
            let currentTheme = 'light'; // light / dark
            let currentTransport = 'kmb'; // 默认九巴

            // DOM 元素
            const langToggle = document.getElementById('langToggle');
            const themeToggle = document.getElementById('themeToggle');
            const transportButtons = document.querySelectorAll('[data-transport]');
            const routeInput = document.getElementById('routeInput');
            const searchBtn = document.getElementById('searchBtn');
            const etaContainer = document.getElementById('etaContainer');
            const statsInfo = document.getElementById('statsInfo');

            // ---------- 更新界面文字 ----------
            function setLanguage(lang) {
                currentLang = lang;
                const dict = i18n[lang === 'zh' ? 'zh' : (lang === 'zhHant' ? 'zhHant' : 'en')];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (dict[key]) el.innerText = dict[key];
                });
                // 更新transport按钮文本（动态）
                document.querySelector('[data-transport="kmb"]').innerText = dict.kmb;
                document.querySelector('[data-transport="ctb"]').innerText = dict.ctb;
                document.querySelector('[data-transport="gmb"]').innerText = dict.gmb;
                document.querySelector('[data-transport="mtr"]').innerText = dict.mtr;
                document.querySelector('[data-transport="tram"]').innerText = dict.tram;
                document.querySelector('[data-transport="ferry"]').innerText = dict.ferry;
                document.querySelector('[data-transport="lrt"]').innerText = dict.lrt;
                // 更新langToggle里面的文字
                langToggle.querySelector('span:last-child').innerText = dict.langBtn;
                themeToggle.querySelector('span:last-child').innerText = dict.themeBtn;
            }

            // 主题切换
            function setTheme(theme) {
                currentTheme = theme;
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }

            // 切换事件
            langToggle.addEventListener('click', () => {
                if (currentLang === 'zh') setLanguage('zhHant');
                else if (currentLang === 'zhHant') setLanguage('en');
                else setLanguage('zh');
            });

            themeToggle.addEventListener('click', () => {
                if (currentTheme === 'light') setTheme('dark');
                else setTheme('light');
            });

            // 交通方式切换
            transportButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    transportButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTransport = btn.dataset.transport;
                });
            });

            // ---------- 统一调用香港政府API (rt.data.gov.hk) ----------
            async function fetchETA(transport, route) {
                if (!route.trim()) throw new Error('empty_route');
                const trimmed = route.trim();
                const dict = i18n[currentLang === 'zh' ? 'zh' : (currentLang === 'zhHant' ? 'zhHant' : 'en')];

                // 定义各个交通方式的API请求（尽可能使用真实批量ETA接口）
                const fetchMap = {
                    // 九巴 使用批量路线ETA /eta/route/{route}/{direction}/{serviceType} 尝试两个方向
                    kmb: async () => {
                        const dirs = ['O', 'I'];
                        const promises = dirs.map(dir => 
                            fetch(`https://rt.data.gov.hk/v1/transport/kmb/eta/route/${trimmed}/${dir}/1`)
                            .then(res => res.ok ? res.json() : Promise.reject('kmb error'))
                            .catch(() => null)
                        );
                        const results = await Promise.allSettled(promises);
                        const combined = [];
                        results.forEach((res, idx) => {
                            if (res.status === 'fulfilled' && res.value?.data) {
                                const dirText = idx === 0 ? dict.directionOut : dict.directionIn;
                                res.value.data.forEach(item => {
                                    if (item.eta) { // 只保留有时刻的
                                        combined.push({
                                            route: item.route,
                                            dir: dirText,
                                            stop: item.stop_name_en || item.stop_name_zh || item.stop,
                                            eta: item.eta,
                                            etaStr: formatEta(item.eta)
                                        });
                                    }
                                });
                            }
                        });
                        return combined;
                    },
                    // 城巴/新巴 (以城巴CTB为例，尝试两个方向)
                    ctb: async () => {
                        const dirs = ['outbound', 'inbound'];
                        const promises = dirs.map(dir => 
                            fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/route/${trimmed}/${dir}?company_id=CTB`)
                            .then(res => res.ok ? res.json() : Promise.reject('ctb error'))
                            .catch(() => null)
                        );
                        const results = await Promise.allSettled(promises);
                        const combined = [];
                        results.forEach((res, idx) => {
                            if (res.status === 'fulfilled' && res.value?.data) {
                                const dirText = idx === 0 ? dict.directionOut : dict.directionIn;
                                res.value.data.forEach(item => {
                                    if (item.eta) {
                                        combined.push({
                                            route: item.route,
                                            dir: dirText,
                                            stop: item.stop_name_en || item.stop_name_zh || item.stop,
                                            eta: item.eta,
                                            etaStr: formatEta(item.eta)
                                        });
                                    }
                                });
                            }
                        });
                        return combined;
                    },
                    // 绿色专线小巴 (GMB) – 使用region=1尝试，API不一定存在，但动态调用
                    gmb: async () => {
                        try {
                            const resp = await fetch(`https://rt.data.gov.hk/v1/transport/gmb/eta/route/${trimmed}/1`);
                            if (!resp.ok) throw new Error('gmb error');
                            const json = await resp.json();
                            if (!json.data || json.data.length === 0) return [];
                            return json.data.map(item => ({
                                route: item.route_no || trimmed,
                                dir: item.direction || dict.directionUnknown,
                                stop: item.stop_name_en || item.stop_name_zh || item.stop_name,
                                eta: item.eta_time,
                                etaStr: item.eta_time ? formatEta(item.eta_time) : dict.noEta
                            }));
                        } catch {
                            // 尝试另一个region
                            const resp2 = await fetch(`https://rt.data.gov.hk/v1/transport/gmb/eta/route/${trimmed}/2`);
                            if (!resp2.ok) throw new Error('gmb error 2');
                            const json = await resp2.json();
                            return (json.data || []).map(item => ({
                                route: item.route_no || trimmed,
                                dir: item.direction || dict.directionUnknown,
                                stop: item.stop_name_en || item.stop_name_zh || item.stop_name,
                                eta: item.eta_time,
                                etaStr: formatEta(item.eta_time)
                            }));
                        }
                    },
                    // 港铁 - 调用线路列表作为演示 (无直接路线ETA, 但展示动态调用)
                    mtr: async () => {
                        const resp = await fetch('https://rt.data.gov.hk/v1/transport/mtr/lines');
                        if (!resp.ok) throw new Error('mtr error');
                        const json = await resp.json();
                        // 返回模拟提示，显示线路列表的前几个
                        const lines = (json.data || []).slice(0, 3).map(l => l.line_code).join(', ');
                        return [{
                            route: trimmed,
                            dir: '港铁',
                            stop: `此路线暂无法查询实时到站 (MTR列车需指定车站) | 可用线路: ${lines || 'N/A'}`,
                            eta: null,
                            etaStr: '请使用车站查询'
                        }];
                    },
                    // 电车 (没有官方实时API，调用一个测试端点展示)
                    tram: async () => {
                        // 使用城巴/电车？无，返回模拟但调用真实端点(hk place) 只展示动态
                        await fetch('https://rt.data.gov.hk/v1/transport/tram/route-list', { mode: 'no-cors' }); // 无法读取，仅演示
                        return [{
                            route: trimmed,
                            dir: '电车',
                            stop: '电车实时数据尚未开放，此查询仅为演示',
                            eta: null,
                            etaStr: '暂不支持'
                        }];
                    },
                    // 渡轮 (调用 ferry 路线列表)
                    ferry: async () => {
                        const resp = await fetch('https://rt.data.gov.hk/v1/transport/ferry/routes');
                        if (!resp.ok) throw new Error('ferry error');
                        const json = await resp.json();
                        return [{
                            route: trimmed,
                            dir: '渡轮',
                            stop: '渡轮到站需指定码头，此处仅展示动态调用',
                            eta: null,
                            etaStr: '查看时刻表'
                        }];
                    },
                    // 轻铁 (港铁轻铁)
                    lrt: async () => {
                        const resp = await fetch('https://rt.data.gov.hk/v1/transport/mtr/lrt/stations');
                        if (!resp.ok) throw new Error('lrt error');
                        const json = await resp.json();
                        return [{
                            route: trimmed,
                            dir: '轻铁',
                            stop: '轻铁实时到站需车站编号，此处为动态调用示例',
                            eta: null,
                            etaStr: '请使用车站'
                        }];
                    }
                };

                if (!fetchMap[transport]) throw new Error('unsupported transport');
                const results = await fetchMap[transport]();
                return results.filter(item => item !== null);
            }

            // 格式化 ISO 时间为 "X分钟" 或 "即将到站"
            function formatEta(isoString) {
                if (!isoString) return '--';
                const etaTime = new Date(isoString);
                if (isNaN(etaTime)) return isoString; // 非ISO原样返回
                const now = new Date();
                const diffMs = etaTime - now;
                const diffMins = Math.round(diffMs / 60000);
                if (diffMins <= 0) return '🚏 即将到站';
                if (diffMins < 60) return `${diffMins} 分钟`;
                return etaTime.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });
            }

            // 渲染结果
            function renderResults(data, error = null) {
                const dict = i18n[currentLang === 'zh' ? 'zh' : (currentLang === 'zhHant' ? 'zhHant' : 'en')];
                if (error) {
                    etaContainer.innerHTML = `<div class="error-box">❌ ${dict.errorFetch} (${error.message})</div>`;
                    statsInfo.innerText = '';
                    return;
                }
                if (!data || data.length === 0) {
                    etaContainer.innerHTML = `<div class="placeholder">⏳ ${dict.noEta}</div>`;
                    statsInfo.innerText = '';
                    return;
                }
                statsInfo.innerText = dict.statsItem(data.length);
                let htmlStr = '';
                data.forEach(item => {
                    const etaClass = (item.etaStr && item.etaStr.includes('即将')) ? 'warn' : '';
                    htmlStr += `
                        <div class="eta-card">
                            <span class="eta-route">${item.route}</span>
                            <span class="eta-direction">${item.dir || ''}</span>
                            <span class="eta-stop">${item.stop || ''}</span>
                            <span class="eta-time ${etaClass}">${item.etaStr || '--'}</span>
                        </div>
                    `;
                });
                etaContainer.innerHTML = htmlStr;
            }

            // 查询动作
            async function performSearch() {
                const route = routeInput.value.trim();
                if (!route) {
                    alert('请输入路线号码');
                    return;
                }

                // 显示载入中
                const dict = i18n[currentLang === 'zh' ? 'zh' : (currentLang === 'zhHant' ? 'zhHant' : 'en')];
                etaContainer.innerHTML = `<div class="placeholder">⏳ ${dict.loading}</div>`;
                statsInfo.innerText = '';

                try {
                    const results = await fetchETA(currentTransport, route);
                    renderResults(results, null);
                } catch (err) {
                    renderResults(null, err);
                }
            }

            searchBtn.addEventListener('click', performSearch);
            routeInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });

            // 初始化：设置语言和主题，激活默认交通
            setLanguage('zh');
            setTheme('light');
            // 确保九巴高亮
            document.querySelector('[data-transport="kmb"]').classList.add('active');

            // 尝试预加载例子 九巴1路
            window.addEventListener('load', () => {
                setTimeout(() => {
                    if (etaContainer.children.length === 1 && etaContainer.children[0].classList.contains('placeholder')) {
                        // 可以悄悄预加载1路，但不必
                    }
                }, 500);
            });
        })();
    </script>
</body>
</html>
