<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM 一键安装</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(165deg, #d0edff, #ffffff, #d0edff);
            padding: 40px 24px;
            border: 1px solid #e5e5e5;
            border-radius: 18px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-weight: 500;
            font-size: 24px;
            color: #202936;
            margin-bottom: 24px;
        }
        .plan-details {
            font-weight: 500;
            font-size: 14px;
            color: #202936;
            margin-bottom: 32px;
        }
        .install-esim {
            width: 100%;
            background-color: #202936;
            border-radius: 8px;
            padding: 12px 0;
            margin-bottom: 28px;
            border: none;
            outline: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .install-esim:hover {
            background-color: #161e29;
        }
        .install-esim a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
        }
        .qr-text {
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Install your eSIM</h1>
        <p class="plan-details">一键触发系统安装 | 小米国行专用</p>
        <!-- 核心安装按钮：已替换你的专属链接，直接调用Google原生入口 -->
        <button class="install-esim">
            <a href="https://esimsetup.android.com/esim_qrcode_provisioning?carddata=LPA:1$mka.prod.ondemandconnectivity.com$RWFDX0HG4AOSY7KYTE1WJFPWFF">一键安装 eSIM</a>
        </button>
        <p class="qr-text">Edge浏览器打开 | 无需其他操作</p>
    </div>
</body>
</html>
