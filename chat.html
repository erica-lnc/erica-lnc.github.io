<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超信 CH-WiFi（离线直连版）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EDEDED;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.topbar{background:#147DF0;color:white;padding:14px;text-align:center}
.chat{height:calc(100vh - 124px);padding:12px;overflow-y:auto}
.msg{display:flex;margin:8px 0}
.msg.me{justify-content:flex-end}
.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:15px}
.msg.other .bubble{background:white}
.msg.me .bubble{background:#9EEA6A}
.inputbar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;padding:10px;gap:8px}
input{flex:1;padding:12px 16px;border-radius:20px;border:1px solid #ddd}
button{padding:12px 20px;background:#147DF0;color:white;border:none;border-radius:20px}
</style>
</head>
<body>
<div class="topbar">超信 CH-WiFi（离线直连）</div>
<div class="chat" id="chat"></div>
<div class="inputbar">
<input id="input" placeholder="发送消息..." />
<button onclick="send()">发送</button>
</div>

<script>
// 超信 CH-WiFi · 纯离线WiFi直连版
const peer = new Peer(undefined, {
  host: "your-server-ip",
  port: 9000,
  path: "/peerjs",
  debug: 0
});

let conn = null;

peer.on("open", id => {
  console.log("你的ID：" + id);
  alert("你的ID：" + id + "\n让对方输入此ID连接");
});

function connect(remoteId) {
  conn = peer.connect(remoteId);
  conn.on("data", data => {
    addMsg(data, false);
  });
}

function send() {
  const text = document.getElementById("input").value.trim();
  if (!text || !conn) return;
  addMsg(text, true);
  conn.send(text);
  document.getElementById("input").value = "";
}

function addMsg(text, isMe) {
  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");
  div.innerHTML = `<div class="bubble">${text}</div>`;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 99999;
}

// 简易连接弹窗
setTimeout(() => {
  const id = prompt("请输入对方的ID连接：");
  if (id) connect(id);
}, 1000);
</script>
<script src="https://your-server.com/peer.min.js"></script>
</body>
</html>
